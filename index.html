<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy birthday papaya</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: monospace;
  color: white;
}

/* VIDEO */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* TEXT */
#dialogue {
  position: absolute;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: 28px;
}

#bigText {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  font-size: 80px;
  display: none;
}

/* FADE */
#black {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  transition: 2s;
}

/* ENTER BUTTON */
#revealBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 22px 70px;
  font-size: 22px;
  letter-spacing: 4px;
  background: transparent;
  color: white;
  border: 2px solid white;
  cursor: pointer;
  display: none;
  z-index: 10;
}

#revealBtn:hover {
  background: white;
  color: black;
}

/* PRE-ENTER PHOTOS */
.photo {
  position: absolute;
  width: 320px;
  border-radius: 16px;
  opacity: 0;
  transition: 2s ease;
}

#p1 { top: 20%; left: 6%; }
#p2 { top: 20%; right: 6%; }
#p4 { bottom: 8%; right: 10%; }

/* NOTE SCREEN */
#finalPage {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  text-align: center;
  padding: 120px 40px;
  z-index: 20;
}

/* SLIDESHOW */
#slideshow {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 30;
}

#slide {
  width: 100%;
  height: 100%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 1.5s ease;
}
</style>
</head>

<body>

<video id="landingVideo" muted>
  <source src="landing.mp4" type="video/mp4">
</video>

<div id="overlay"></div>
<div id="black"></div>

<audio id="towerAudio" src="tower.mp3"></audio>
<audio id="dadAudio" src="dad.mp3"></audio>
<audio id="bgMusic" src="topgun.mp3"></audio>
<audio id="dangerZone" src="dangerzone.mp3"></audio>

<div id="dialogue">Initializing Air Force Channel...</div>
<div id="bigText">HAPPY BIRTHDAY</div>

<img src="photo1.jpg" class="photo" id="p1">
<img src="photo2.jpg" class="photo" id="p2">
<img src="photo4.jpg" class="photo" id="p4">

<button id="revealBtn">ENTER</button>

<div id="finalPage">
  <h1>Happy Birthday PAPAYA</h1>
  <p>
    <br><br>
    Have the best dayyyyyy, let it be hype for the first time, cuz i never do anything for anyone, so its very rareeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee<br><br>
    SO U HAVE TO ENJOY OR ELSE.<br><br>
    I love you, u think i was done? NAHHHHHH
  </p>
</div>

<div id="slideshow">
  <img id="slide" src="photo5.jpg">
</div>

<script>
let dialogue = document.getElementById("dialogue");
let towerAudio = document.getElementById("towerAudio");
let dadAudio = document.getElementById("dadAudio");
let video = document.getElementById("landingVideo");
let music = document.getElementById("bgMusic");
let danger = document.getElementById("dangerZone");
let bigText = document.getElementById("bigText");
let black = document.getElementById("black");
let button = document.getElementById("revealBtn");
let photos = document.querySelectorAll(".photo");

function start() {

  music.volume = 0.4;
  music.play();

  setTimeout(() => video.play(), 200);

  dialogue.innerText = "Tower, this is Captain Praveen Vashist, requesting permission to land.";
  dadAudio.play();

  setTimeout(() => {
    dialogue.innerText = "Cleared to land.";
    towerAudio.play();
  }, 4000);

  setTimeout(() => {
    dialogue.innerText = "Welcome home.";
  }, 9000);

  setTimeout(() => {
    dialogue.style.display = "none";
    bigText.style.display = "block";
  }, 12000);

  setTimeout(() => black.style.opacity = 1, 15000);
  setTimeout(() => bigText.style.display = "none", 16500);

  setTimeout(() => {
    photos.forEach(p => p.style.opacity = 1);
    button.style.display = "block";
  }, 17500);
}

setTimeout(start, 2000);


/* ================= SLIDESHOW (ONLY TIMING CHANGED) ================= */

let slide = document.getElementById("slide");

let images = [];
for (let i = 5; i <= 25; i++) {
  images.push(`photo${i}.jpg`);
}

let index = 0;
let interval;

function fadeOutAudio(audio, duration = 2000) {
  let step = audio.volume / (duration / 50);

  let fade = setInterval(() => {
    if (audio.volume > step) {
      audio.volume -= step;
    } else {
      audio.volume = 0;
      audio.pause();
      clearInterval(fade);
    }
  }, 50);
}

function endSlideshow() {
  clearInterval(interval);

  fadeOutAudio(danger, 2000);

  setTimeout(() => {
    document.getElementById("slideshow").style.display = "none";
    black.style.opacity = 1;
  }, 1000);
}

function startSlideshow() {

  document.getElementById("slideshow").style.display = "block";

  index = 0;
  slide.src = images[index];
  slide.style.opacity = 1;

  interval = setInterval(() => {

    slide.style.opacity = 0;

    setTimeout(() => {

      index++;

      if (index >= images.length) {
        endSlideshow();
        return;
      }

      slide.src = images[index];
      slide.style.opacity = 1;

    }, 350); // ONLY CHANGE (was 800)

  }, 1750); // ONLY CHANGE (was 3000)

}

/* ENTER CLICK */
button.onclick = () => {

  music.pause();

  danger.volume = 0.7;
  danger.play();

  document.getElementById("finalPage").style.display = "block";

  setTimeout(() => {
    document.getElementById("finalPage").style.display = "none";
    startSlideshow();
  }, 10000);
};
</script>

</body>
</html>
